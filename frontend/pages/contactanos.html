<header>
    <nav id="nav">
        <ul class="nav-center">

        </ul>

        <a href="/" class="admin">Ingresar como dueño</a>
    </nav>
</header>

<main class="contenedor-formulario">
    <div class="formulario-contacto">
        <h1>Formulario de Contacto</h1>
        <p class="descripcion-formulario">¿Tenés alguna consulta? Completá el formulario y te responderemos a la brevedad.</p>
        
        <form class="form-contacto">
            <div class="campo-formulario">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
            </div>

            <div class="campo-formulario">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="campo-formulario">
                <label for="asunto">Asunto:</label>
                <select id="asunto" name="asunto" required>
                    <option value="">Seleccionar asunto</option>
                    <option value="consulta">Consulta</option>
                    <option value="reclamo">Reclamo</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="campo-formulario">
                <label for="mensaje">Mensaje:</label>
                <textarea name="mensaje" id="mensaje" rows="4" placeholder="Escribí tu mensaje aquí" required></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar Mensaje</button>
        </form>
    </div>
</main>
